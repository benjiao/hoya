services:
  db:
    image: postgres:18
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-hoya}
      POSTGRES_USER: ${POSTGRES_USER:-hoya}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hoya}
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hoya} -d ${POSTGRES_DB:-hoya}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    build: api/
    command: python manage.py migrate --noinput
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://hoya:hoya@db:5432/hoya}
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-in-production}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: on-failure

  api:
    build: api/
    command: sh -c "python manage.py collectstatic --noinput && python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ${MEDIA_PATH:-media_data}:/media
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://hoya:hoya@db:5432/hoya}
      DEBUG: ${DEBUG:-true}
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-in-production}
      MEDIA_ROOT: ${MEDIA_ROOT:-/media}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/0}
    depends_on:
      migrate:
        condition: service_completed_successfully

  worker:
    build: api/
    command: celery -A config worker --loglevel=info
    volumes:
      - ${MEDIA_PATH:-media_data}:/media
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://hoya:hoya@db:5432/hoya}
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-in-production}
      MEDIA_ROOT: ${MEDIA_ROOT:-/media}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/0}
      WATERING_INTERVAL_WINDOW: ${WATERING_INTERVAL_WINDOW:-10}
    depends_on:
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  beat:
    build: api/
    command: celery -A config beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://hoya:hoya@db:5432/hoya}
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-in-production}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/0}
      WATERING_INTERVAL_WINDOW: ${WATERING_INTERVAL_WINDOW:-10}
    depends_on:
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  web:
    build: web/
    ports:
      - "${WEB_PORT:-5173}:5173"
    volumes:
      - /app/node_modules
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8000/api/}
      VITE_ALLOWED_HOSTS: ${VITE_ALLOWED_HOSTS:-}
    depends_on:
      - api

volumes:
  postgres_data:
  media_data:
